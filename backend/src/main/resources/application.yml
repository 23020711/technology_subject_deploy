spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    enabled: ${ELASTICSEARCH_ENABLED:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    validate-baseline-on-migrate: true

server:
  port: ${PORT:8080}
  address: ${SERVER_HOST:0.0.0.0}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,chrome-extension://*}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: ${REDIS_ENABLED:false}
    elasticsearch:
      enabled: ${ELASTICSEARCH_ENABLED:false}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false

supabase:
  url: ${SUPABASE_URL:}
  api:
    key: ${SUPABASE_API_KEY:}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    com.pricehawl.service.MultiPlatformPriceRefreshService: INFO
    com.pricehawl.service.crawler: DEBUG

pricehawk:
  debug:
    price-refresh-dir: "./debug/price-refresh"

  scheduler:
    price-refresh:
      enabled: ${SCHEDULER_ENABLED:false}
      cron: "0 */15 * * * *"
      zone: "Asia/Bangkok"
      max-items-per-run: 50

  crawler:
    watsons-script: "backend/watsons-price.js"
    cocolux-script: "backend/cocolux-price.js"
    thread-pool-size: 5

resend:
  api-key: ${RESEND_API_KEY:}

ai:
  base-url: ${AI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gemini-2.5-flash}
  enable-search: true

accesstrade:
  api-key: ${ACCESSTRADE_API_KEY:}
