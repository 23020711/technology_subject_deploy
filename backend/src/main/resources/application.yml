spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:postgres.astkanfsacxriwprspqr}
    password: ${SPRING_DATASOURCE_PASSWORD:PriceHawl123@}
    driver-class-name: org.postgresql.Driver

    hikari:
      # Tăng số lượng kết nối để không phải xếp hàng chờ (Queueing)
      maximum-pool-size: 6
      minimum-idle: 5
      # CỰC KỲ QUAN TRỌNG: Giữ kết nối luôn "nóng" sang Hàn Quốc để giảm ping
      keepalive-time: 30000 
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        # Tối ưu hóa việc lấy dữ liệu hàng loạt
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS}
    username: ${ELASTICSEARCH_USERNAME}
    password: ${ELASTICSEARCH_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:${REDISHOST:localhost}}
      port: ${REDIS_PORT:${REDISPORT:6379}}
      password: ${REDIS_PASSWORD:${REDISPASSWORD:}}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

server:
  port: ${PORT:8080}

logging:
  level:
    root: WARN
    org.springframework.security: WARN
    # INFO giúp tránh nghẽn I/O hơn so với DEBUG khi hệ thống chạy thực tế
    com.pricehawl.service.MultiPlatformPriceRefreshService: INFO
    com.pricehawl.service.crawler: INFO

pricehawk:
  debug:
    price-refresh-dir: "./debug/price-refresh"

  scheduler:
    price-refresh:
      enabled: false
      cron: "0 */15 * * * *"
      zone: "Asia/Bangkok"
      max-items-per-run: 50

  crawler:
    watsons-script: "backend/watsons-price.js"
    cocolux-script: "backend/cocolux-price.js"
    thread-pool-size: 5

resend:
  api-key: ${RESEND_API_KEY:}

ai:
  base-url: ${AI_BASE_URL:https://generativelanguage.googleapis.com}
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gemini-2.5-flash}
  enable-search: true

# AccessTrade & Other configs
accesstrade:
  api-key: ${ACCESSTRADE_API_KEY:}

supabase:
  url: "${SUPABASE_URL:https://astkanfsacxriwprspqr.supabase.co}"
  api:
    key: "${SUPABASE_API_KEY:sb_publishable_eT1klaZ7funqt0MuifuEWA_ea7Zixc9}"